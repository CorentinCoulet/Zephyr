version: "3.9"

services:
  kitsune:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kitsune-intelligence
    ports:
      - "${KITSUNE_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
      - ./baselines:/app/baselines
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
