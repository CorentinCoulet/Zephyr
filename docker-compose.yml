version: "3.9"

services:
  zephyr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zephyr-intelligence
    ports:
      - "${ZEPHYR_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - ZEPHYR_HOST=0.0.0.0
      - ZEPHYR_PORT=8000
    volumes:
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
      - ./baselines:/app/baselines
      - ./zephyr.server.yaml:/app/zephyr.server.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
